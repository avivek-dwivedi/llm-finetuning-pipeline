project:
  name: ec2-finetuning-v1
  run_name: vlm-blip-lora-flickr30k-small
  output_dir: ./outputs/vlm

model:
  # Stable image-captioning VLM for teaching LoRA workflow.
  # It is not a chat VLM, but it proves image+text fine-tuning lifecycle.
  name: Salesforce/blip-image-captioning-base
  trust_remote_code: false
  torch_dtype: bf16

data:
  dataset_name: nlphuji/flickr30k
  split: test
  # Start with 20 samples for smoke tests. Students can increase to 500 or 1000 after the first successful run.
  max_samples: 20
  image_dir: ./data/vlm/images
  output_jsonl: ./data/vlm/train.jsonl

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  # BLIP attention modules commonly expose query/key/value names.
  target_modules: [query, key, value]

training:
  epochs: 1
  max_seq_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0001
  logging_steps: 5
  save_steps: 50
  bf16: true
  fp16: false
  report_to: [wandb]
