project:
  name: ec2-finetuning-v1
  run_name: dpo-qwen-0_5b-qlora
  output_dir: ./outputs/dpo

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: true
  use_4bit: true
  torch_dtype: bf16

data:
  dataset_name: trl-lib/ultrafeedback_binarized
  split: train
  # Start with 20 samples for smoke tests. Students can increase to 500 or 1000 after the first successful run.
  max_samples: 20
  output_jsonl: ./data/dpo/train.jsonl

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  epochs: 1
  max_length: 512
  max_prompt_length: 256
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.00005
  logging_steps: 10
  save_steps: 100
  beta: 0.1
  bf16: true
  fp16: false
  report_to: [wandb]
